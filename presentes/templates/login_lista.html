{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Acesso Restrito 💍</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .login-topo {

            margin-bottom: 25px;
        }

        .icone-login {

            width: 85px;

            height: 85px;

            background: #edf2e2;

            border-radius: 50%;

            display: flex;

            align-items: center;

            justify-content: center;

            margin: 0 auto 20px auto;

            color: #63783D;

            font-size: 2rem;
        }

        .titulo-login {

            font-family: 'Cormorant Garamond', serif;

            color: #556b2f;

            font-size: 3rem;

            margin-bottom: 8px;
        }

        .texto-login {

            color: #7b7b7b;

            font-size: 0.95rem;

            line-height: 1.5;

            margin-bottom: 30px;
        }

        .btn-login {

            margin-top: 10px;
        }

        .erro-login {

            margin-top: 18px;

            background: #fff1f1;

            color: #b42318;

            padding: 14px;

            border-radius: 14px;

            font-size: 14px;

            border: 1px solid #ffd5d5;
        }

        .voltar-home {

            margin-top: 25px;
        }

        .voltar-home a {

            color: #7FA653;

            text-decoration: none;

            font-size: 14px;

            font-weight: 600;

            transition: 0.3s;
        }

        .voltar-home a:hover {

            opacity: 0.7;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- Topo -->
        <div class="login-topo">

            <div class="icone-login">

                <i class="fa-solid fa-lock"></i>

            </div>

            <h1 class="titulo-login">

                Área Restrita

            </h1>

            <p class="texto-login">

                Digite a senha para acessar
                o painel de contribuições 💚

            </p>

        </div>

        <!-- Formulário -->
        <form method="post">

            {% csrf_token %}

            <label class="label">

                <i class="fa-solid fa-key"></i>

                Senha de acesso

            </label>

            <input type="password" name="senha" placeholder="Digite sua senha" required>

            <button type="submit" class="submit btn-login">

                <i class="fa-solid fa-arrow-right-to-bracket"></i>

                Entrar

            </button>

        </form>

        <!-- Erro -->
        {% if erro %}

        <div class="erro-login">

            <i class="fa-solid fa-circle-exclamation"></i>

            Senha incorreta

        </div>

        {% endif %}

        <!-- Voltar -->
        <div class="voltar-home">

            <a href="/">

                <i class="fa-solid fa-arrow-left"></i>

                Voltar ao início

            </a>

        </div>

    </div>

</body>

</html>
